<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armá tu Shawarma — Habibi NQN</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --night: #0F0900;
  --night2: #1C1000;
  --gold: #D4A847;
  --gold2: #F0C85A;
  --gold-pale: #FDF6E3;
  --spice: #B54A1A;
  --spice2: #E06030;
  --cream: #FAF3E8;
  --border: #3A2800;
  --text: #1C1000;
  --muted: #7A5C30;
  --white: #FFFFFF;
  --green: #2D6A4F;
  --green-pale: #D8F3DC;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--night);
  min-height: 100vh;
  color: var(--white);
  position: relative;
  overflow-x: hidden;
}

/* Background pattern */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(212,168,71,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(181,74,26,0.08) 0%, transparent 60%);
  pointer-events: none;
}

/* ── HEADER ── */
.hero {
  text-align: center;
  padding: 48px 24px 32px;
  position: relative;
}
.hero-badge {
  display: inline-block;
  border: 1px solid rgba(212,168,71,0.4);
  color: var(--gold);
  padding: 4px 16px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 7vw, 52px);
  color: var(--gold2);
  line-height: 1.1;
  margin-bottom: 10px;
}
.hero p {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
  max-width: 380px;
  margin: 0 auto;
  line-height: 1.6;
}
.ornament { color: var(--gold); opacity: 0.3; font-size: 20px; margin: 0 8px; }

/* ── CONTENEDOR ── */
.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ── NOMBRE ── */
.name-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,168,71,0.2);
  border-radius: 20px;
  padding: 22px 24px;
  margin-bottom: 20px;
}
.name-card label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--gold);
  margin-bottom: 10px;
}
.name-card input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(212,168,71,0.25);
  border-radius: 12px;
  padding: 13px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: white;
  outline: none;
  transition: border-color 0.2s;
}
.name-card input::placeholder { color: rgba(255,255,255,0.25); }
.name-card input:focus { border-color: var(--gold); }

/* ── SHAWARMA CARD ── */
.shawarma-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,168,71,0.15);
  border-radius: 24px;
  overflow: hidden;
  margin-bottom: 16px;
  transition: border-color 0.3s;
}
.shawarma-card:focus-within { border-color: rgba(212,168,71,0.4); }

.sw-header {
  background: linear-gradient(135deg, rgba(212,168,71,0.15) 0%, rgba(181,74,26,0.1) 100%);
  padding: 16px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(212,168,71,0.1);
}
.sw-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--gold2);
  display: flex; align-items: center; gap: 10px;
}
.sw-num {
  width: 28px; height: 28px;
  background: var(--gold);
  color: var(--night);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  font-family: 'DM Sans', sans-serif;
}
.btn-remove {
  background: rgba(181,74,26,0.15);
  border: 1px solid rgba(181,74,26,0.3);
  color: var(--spice2);
  padding: 5px 12px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-remove:hover { background: rgba(181,74,26,0.3); }

.sw-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 20px; }

/* ── STEP ── */
.step-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--gold);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.step-label span {
  background: rgba(212,168,71,0.15);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
}

/* ── CHIPS ── */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 8px 16px;
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  color: rgba(255,255,255,0.6);
  user-select: none;
  background: rgba(255,255,255,0.04);
}
.chip:hover { border-color: rgba(212,168,71,0.5); color: white; }
.chip.selected-proteina {
  border-color: var(--spice2);
  background: rgba(181,74,26,0.2);
  color: var(--spice2);
  font-weight: 600;
}
.chip.selected-vegetal {
  border-color: #52B788;
  background: rgba(82,183,136,0.15);
  color: #52B788;
  font-weight: 600;
}
.chip.selected-salsa {
  border-color: var(--gold);
  background: rgba(212,168,71,0.15);
  color: var(--gold2);
  font-weight: 600;
}
.chip.selected-extra {
  border-color: var(--gold);
  background: rgba(212,168,71,0.15);
  color: var(--gold2);
  font-weight: 600;
}
.chip.disabled {
  opacity: 0.3;
  cursor: not-allowed;
  pointer-events: none;
}

.limit-note {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 6px;
  font-style: italic;
}

/* ── DIVIDER ── */
.step-divider {
  height: 1px;
  background: rgba(212,168,71,0.08);
}

/* ── BOTÓN AGREGAR ── */
.btn-add {
  width: 100%;
  padding: 15px;
  background: rgba(212,168,71,0.08);
  border: 1.5px dashed rgba(212,168,71,0.3);
  border-radius: 18px;
  color: var(--gold);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-bottom: 28px;
}
.btn-add:hover {
  background: rgba(212,168,71,0.14);
  border-color: rgba(212,168,71,0.6);
}

/* ── RESUMEN ── */
.resumen-section {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,168,71,0.2);
  border-radius: 20px;
  padding: 22px;
  margin-bottom: 20px;
  display: none;
}
.resumen-section.visible { display: block; }
.resumen-title {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--gold); margin-bottom: 14px;
}
.resumen-item {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  line-height: 1.5;
}
.resumen-item:last-child { border-bottom: none; }
.resumen-item strong { color: white; }

/* ── BOTÓN ENVIAR ── */
.btn-enviar {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
  border: none;
  border-radius: 16px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 8px 24px rgba(37,211,102,0.25);
}
.btn-enviar:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(37,211,102,0.35); }
.btn-enviar:active { transform: translateY(0); }
.btn-enviar svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

.footer-note {
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  margin-top: 16px;
}

/* ── iOS / Safari fixes ── */
.shawarma-card { -webkit-transform: translateZ(0); transform: translateZ(0); }
.chips { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 8px; }
.chip { display: -webkit-inline-flex; display: inline-flex; -webkit-tap-highlight-color: transparent; cursor: pointer; }
.sw-body { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 20px; }

/* ── ERROR ── */
.error-msg {
  background: rgba(181,74,26,0.15);
  border: 1px solid rgba(181,74,26,0.4);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--spice2);
  margin-top: 12px;
  display: none;
}
.error-msg.show { display: block; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">Habibi NQN · Neuquén</div>
  <h1>Armá tu<br>Shawarma 🥙</h1>
  <p>Personalizá cada shawarma a tu gusto. Al final te mandamos el resumen por WhatsApp.</p>
</div>

<div class="container">

  <!-- NOMBRE -->
  <div class="name-card">
    <label>👤 Tu nombre</label>
    <input type="text" id="nombre-cliente" placeholder="¿Cómo te llamás?">
  </div>

  <!-- SHAWARMAS CONTAINER -->
  <div id="shawarmas-container"></div>

  <!-- BOTÓN AGREGAR -->
  <button class="btn-add" onclick="agregarShawarma()">
    + Agregar otro shawarma
  </button>

  <!-- RESUMEN -->
  <div class="resumen-section" id="resumen-section">
    <div class="resumen-title">📋 Tu pedido</div>
    <div id="resumen-contenido"></div>
  </div>

  <div class="error-msg" id="error-msg">⚠️ Por favor completá todos los campos antes de enviar.</div>

  <!-- BOTÓN WHATSAPP -->
  <button class="btn-enviar" onclick="enviarWhatsApp()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Enviar pedido por WhatsApp
  </button>
  <p class="footer-note">Tu pedido se abrirá en WhatsApp listo para enviar a Habibi NQN</p>

</div>

<script>
var WHATSAPP_NUM = '5492996084740';

var PROTEINAS = ['Carne', 'Pollo', 'Cerdo'];
var VEGETALES = ['Lechuga', 'Perejil', 'Tomate', 'Cebolla colorada'];
var SALSAS    = ['Salsa arabe de yogur', 'Hummus', 'Baba ganoush'];
var EXTRAS    = ['Crema adicional'];

var counter = 0;
var shawarmas = {};

// EVENT DELEGATION - compatible con todos los iOS Safari
document.addEventListener('click', function(e) {
  var el = e.target;
  if (!el) return;
  if (el.classList && el.classList.contains('chip') && !el.classList.contains('disabled')) {
    toggleChip(el);
  }
  if (el.classList && el.classList.contains('btn-remove')) {
    var swId = el.getAttribute('data-sw-remove');
    if (swId) removerShawarma(parseInt(swId, 10));
  }
  if (el.id === 'btn-add-sw') {
    agregarShawarma();
  }
  if (el.id === 'btn-enviar' || (el.parentNode && el.parentNode.id === 'btn-enviar')) {
    enviarWhatsApp();
  }
});

function agregarShawarma() {
  counter++;
  var id = counter;
  shawarmas[id] = { proteinas: [], vegetales: [], salsa: '', extras: [] };
  var container = document.getElementById('shawarmas-container');
  var card = document.createElement('div');
  card.className = 'shawarma-card';
  card.id = 'sw-' + id;
  card.innerHTML = buildCard(id);
  container.appendChild(card);
  actualizarResumen();
}

function buildCard(id) {
  var ids = Object.keys(shawarmas);
  var num = ids.indexOf(String(id)) + 1;
  var removeBtn = ids.length > 1
    ? '<button class="btn-remove" data-sw-remove="' + id + '">&times; Quitar</button>'
    : '';

  var protChips = '';
  for (var i = 0; i < PROTEINAS.length; i++) {
    protChips += '<span class="chip" data-sw="' + id + '" data-type="proteina" data-val="' + PROTEINAS[i] + '">' + PROTEINAS[i] + '</span>';
  }

  var vegChips = '';
  for (var i = 0; i < VEGETALES.length; i++) {
    vegChips += '<span class="chip" data-sw="' + id + '" data-type="vegetal" data-val="' + VEGETALES[i] + '">' + VEGETALES[i] + '</span>';
    vegChips += '<span class="chip" data-sw="' + id + '" data-type="vegetal" data-val="Sin ' + VEGETALES[i] + '" style="font-size:11px">Sin ' + VEGETALES[i] + '</span>';
  }

  var salsaChips = '';
  for (var i = 0; i < SALSAS.length; i++) {
    salsaChips += '<span class="chip" data-sw="' + id + '" data-type="salsa" data-val="' + SALSAS[i] + '">' + SALSAS[i] + '</span>';
  }

  var extraChips = '';
  for (var i = 0; i < EXTRAS.length; i++) {
    extraChips += '<span class="chip" data-sw="' + id + '" data-type="extra" data-val="' + EXTRAS[i] + '">' + EXTRAS[i] + '</span>';
  }

  return '<div class="sw-header">'
    + '<div class="sw-title"><span class="sw-num">' + num + '</span> Shawarma ' + num + '</div>'
    + removeBtn
    + '</div>'
    + '<div class="sw-body">'
    + '<div>'
    + '<div class="step-label">&#x1F969; Proteina <span>Elegi hasta 2</span></div>'
    + '<div class="chips" id="chips-proteina-' + id + '">' + protChips + '</div>'
    + '<div class="limit-note" id="note-proteina-' + id + '"></div>'
    + '</div>'
    + '<div class="step-divider"></div>'
    + '<div>'
    + '<div class="step-label">&#x1F957; Vegetales <span>Todos los que quieras</span></div>'
    + '<div class="chips">' + vegChips + '</div>'
    + '</div>'
    + '<div class="step-divider"></div>'
    + '<div>'
    + '<div class="step-label">&#x1F963; Salsa principal <span>Elegi 1</span></div>'
    + '<div class="chips" id="chips-salsa-' + id + '">' + salsaChips + '</div>'
    + '</div>'
    + '<div class="step-divider"></div>'
    + '<div>'
    + '<div class="step-label">&#x2728; Extra opcional</div>'
    + '<div class="chips">' + extraChips + '</div>'
    + '</div>'
    + '</div>';
}

function toggleChip(el) {
  var id   = el.getAttribute('data-sw');
  var type = el.getAttribute('data-type');
  var val  = el.getAttribute('data-val');
  var sw   = shawarmas[id];
  if (!sw) return;
  var selClass = 'selected-' + type;

  if (type === 'proteina') {
    if (el.classList.contains(selClass)) {
      el.classList.remove(selClass);
      var newProt = [];
      for (var i = 0; i < sw.proteinas.length; i++) {
        if (sw.proteinas[i] !== val) newProt.push(sw.proteinas[i]);
      }
      sw.proteinas = newProt;
    } else {
      if (sw.proteinas.length >= 2) return;
      el.classList.add(selClass);
      sw.proteinas.push(val);
    }
    var chips = document.querySelectorAll('#chips-proteina-' + id + ' .chip');
    for (var j = 0; j < chips.length; j++) {
      if (!chips[j].classList.contains(selClass)) {
        if (sw.proteinas.length >= 2) {
          chips[j].classList.add('disabled');
        } else {
          chips[j].classList.remove('disabled');
        }
      }
    }
    var note = document.getElementById('note-proteina-' + id);
    if (note) note.textContent = sw.proteinas.length === 2 ? 'Maximo 2 proteinas seleccionadas.' : '';

  } else if (type === 'vegetal') {
    if (el.classList.contains(selClass)) {
      el.classList.remove(selClass);
      var newVeg = [];
      for (var i = 0; i < sw.vegetales.length; i++) {
        if (sw.vegetales[i] !== val) newVeg.push(sw.vegetales[i]);
      }
      sw.vegetales = newVeg;
    } else {
      el.classList.add(selClass);
      sw.vegetales.push(val);
    }

  } else if (type === 'salsa') {
    var salsaChips = document.querySelectorAll('#chips-salsa-' + id + ' .chip');
    for (var k = 0; k < salsaChips.length; k++) {
      salsaChips[k].classList.remove(selClass);
    }
    if (sw.salsa === val) {
      sw.salsa = '';
    } else {
      el.classList.add(selClass);
      sw.salsa = val;
    }

  } else if (type === 'extra') {
    if (el.classList.contains(selClass)) {
      el.classList.remove(selClass);
      var newExt = [];
      for (var i = 0; i < sw.extras.length; i++) {
        if (sw.extras[i] !== val) newExt.push(sw.extras[i]);
      }
      sw.extras = newExt;
    } else {
      el.classList.add(selClass);
      sw.extras.push(val);
    }
  }

  actualizarResumen();
}

function removerShawarma(id) {
  delete shawarmas[id];
  var card = document.getElementById('sw-' + id);
  if (card && card.parentNode) card.parentNode.removeChild(card);
  actualizarResumen();
}

function actualizarResumen() {
  var ids = Object.keys(shawarmas);
  var resumen = document.getElementById('resumen-section');
  var contenido = document.getElementById('resumen-contenido');
  if (!ids.length) {
    resumen.classList.remove('visible');
    return;
  }
  var html = '';
  for (var i = 0; i < ids.length; i++) {
    var sw = shawarmas[ids[i]];
    var prot = sw.proteinas.length ? sw.proteinas.join(' + ') : '-';
    var veg  = sw.vegetales.length ? sw.vegetales.join(', ') : '-';
    var sal  = sw.salsa || '-';
    var ext  = sw.extras.length ? sw.extras.join(', ') : '';
    html += '<div class="resumen-item"><strong>Shawarma ' + (i+1) + ':</strong> '
      + prot + ' &middot; ' + veg + ' &middot; ' + sal
      + (ext ? ' &middot; ' + ext : '') + '</div>';
  }
  contenido.innerHTML = html;
  resumen.classList.add('visible');
}

function validar() {
  var nombre = document.getElementById('nombre-cliente').value.trim();
  if (!nombre) return false;
  var ids = Object.keys(shawarmas);
  if (!ids.length) return false;
  for (var i = 0; i < ids.length; i++) {
    var sw = shawarmas[ids[i]];
    if (!sw.proteinas.length || !sw.salsa) return false;
  }
  return true;
}

function enviarWhatsApp() {
  var errorEl = document.getElementById('error-msg');
  if (!validar()) {
    errorEl.classList.add('show');
    errorEl.textContent = 'Por favor completa: tu nombre, la proteina y la salsa de cada shawarma.';
    setTimeout(function() { errorEl.classList.remove('show'); }, 4000);
    return;
  }
  errorEl.classList.remove('show');

  var nombre = document.getElementById('nombre-cliente').value.trim();
  var ids = Object.keys(shawarmas);
  var msg = 'PEDIDO HABIBI NQN\n';
  msg += 'Cliente: ' + nombre + '\n';
  msg += '--------------------\n';

  for (var i = 0; i < ids.length; i++) {
    var sw = shawarmas[ids[i]];
    msg += '\nShawarma ' + (i+1) + '\n';
    msg += 'Proteina: ' + sw.proteinas.join(' + ') + '\n';
    msg += 'Vegetales: ' + (sw.vegetales.length ? sw.vegetales.join(', ') : 'Sin vegetales') + '\n';
    msg += 'Salsa: ' + sw.salsa + '\n';
    if (sw.extras.length) msg += 'Extra: ' + sw.extras.join(', ') + '\n';
  }

  msg += '\n--------------------\n';
  msg += 'Total: ' + ids.length + ' shawarma' + (ids.length > 1 ? 's' : '');

  var url = 'https://wa.me/' + WHATSAPP_NUM + '?text=' + encodeURIComponent(msg);
  window.location.href = url;
}

// INIT - window.load es el mas compatible con iOS Safari
window.addEventListener('load', function() {
  agregarShawarma();
});
</script>
</body>
